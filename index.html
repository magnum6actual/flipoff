<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#111111">
  <title>FlipOff. — Free Split-Flap Display for Any TV</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/board.css">
  <link rel="stylesheet" href="css/tile.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <div class="page-frame">
    <!-- Header -->
    <header class="header">
      <div class="header-logo">
        FlipOff.
        <span class="config-indicator" id="config-indicator"></span>
      </div>
      <nav class="header-nav">
        <a href="control.html" target="flipoff-control" class="control-panel-btn">Control Panel</a>
        <a href="/admin" class="control-panel-btn admin-btn" id="admin-btn" style="display:none">Admin</a>
        <button class="fullscreen-btn" id="fullscreen-btn" aria-label="Toggle fullscreen">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 3 21 3 21 9"></polyline>
            <polyline points="9 21 3 21 3 15"></polyline>
            <line x1="21" y1="3" x2="14" y2="10"></line>
            <line x1="3" y1="21" x2="10" y2="14"></line>
          </svg>
          Fullscreen
        </button>
        <button class="volume-icon" id="volume-btn" aria-label="Toggle sound">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
          </svg>
        </button>
      </nav>
    </header>

    <!-- Board -->
    <main class="board-section" id="board-container" role="status" aria-live="polite" aria-label="Split-flap message display">
    </main>

    <!-- Countdown bar (hidden in fullscreen) -->
    <div class="countdown-bar" id="countdown-bar" role="progressbar" aria-label="Time until next message">
      <div class="countdown-fill" id="countdown-fill"></div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
